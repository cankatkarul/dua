<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0c">
<title>Günlük Dualarım</title>
<link rel="icon" href="assets/allah-lafza.png">
<link rel="apple-touch-icon" href="assets/allah-lafza.png">
<link rel="stylesheet" href="css/style.css">
</head>
<body class="theme-dark" data-font-size="medium">

  <!-- ================= HOME SCREEN ================= -->
  <main id="home" class="screen home-screen">
    <div class="home-bg-emblem" aria-hidden="true"></div>
    <header class="home-header">
      <div class="eyebrow">Günaydın</div>
      <h1 class="home-title">Günlük Dualarım</h1>
      <p class="home-sub">Güne başlamadan okunacak yedi bölüm</p>
    </header>

    <section class="dua-list" id="duaList"><!-- JS ile doldurulur --></section>

    <button class="home-counter-fab" id="homeCounterFab" aria-label="Zikirmatik">
      <span class="counter-fab-ring"><span class="counter-fab-num" id="homeCounterFabNum">0</span></span>
    </button>

    <footer class="home-footer">
      <button class="settings-fab" id="openSettings" aria-label="Ayarlar">
        <svg viewBox="0 0 24 24" width="22" height="22"><path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z" fill="none" stroke="currentColor" stroke-width="1.6"/><path d="M19.4 13.5c.04-.33.06-.66.06-1s-.02-.67-.06-1l2.03-1.58a.5.5 0 0 0 .12-.64l-1.92-3.32a.5.5 0 0 0-.6-.22l-2.4.96a7.4 7.4 0 0 0-1.73-1l-.36-2.54a.5.5 0 0 0-.5-.42h-3.84a.5.5 0 0 0-.5.42l-.36 2.54c-.63.24-1.2.58-1.73 1l-2.4-.96a.5.5 0 0 0-.6.22L2.63 9.28a.5.5 0 0 0 .12.64L4.78 11.5c-.04.33-.06.66-.06 1s.02.67.06 1L2.75 15.08a.5.5 0 0 0-.12.64l1.92 3.32a.5.5 0 0 0 .6.22l2.4-.96c.53.42 1.1.76 1.73 1l.36 2.54a.5.5 0 0 0 .5.42h3.84a.5.5 0 0 0 .5-.42l.36-2.54c.63-.24 1.2-.58 1.73-1l2.4.96a.5.5 0 0 0 .6-.22l1.92-3.32a.5.5 0 0 0-.12-.64L19.4 13.5Z" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/></svg>
      </button>
    </footer>
  </main>

  <!-- ================= READER SCREEN ================= -->
  <main id="reader" class="screen reader-screen" hidden>
    <div class="reader-bg-emblem" aria-hidden="true"></div>
    <header class="reader-header">
      <button class="icon-btn back-btn" id="backBtn" aria-label="Geri">
        <svg viewBox="0 0 24 24" width="20" height="20"><path d="M15 5l-7 7 7 7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <div class="reader-title-wrap">
        <div class="reader-title" id="readerTitle">-</div>
        <div class="reader-subtitle" id="readerSubtitle">-</div>
      </div>
      <button class="icon-btn" id="readerSettingsBtn" aria-label="Görünüm">
        <svg viewBox="0 0 24 24" width="20" height="20"><path d="M4 7h11M4 12h16M4 17h7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      </button>
    </header>

    <div class="reader-body" id="readerBody"><!-- JS ile doldurulur --></div>

    <button class="counter-fab" id="counterFab" aria-label="Sayaç">
      <span class="counter-fab-ring"><span class="counter-fab-num" id="counterFabNum">0</span></span>
    </button>
  </main>

  <!-- ================= COUNTER (TASBİH) SHEET ================= -->
  <div class="sheet-backdrop" id="counterBackdrop" hidden></div>
  <section class="sheet counter-sheet" id="counterSheet" hidden>
    <div class="sheet-handle"></div>
    <div class="counter-target" id="counterTarget">Hedef: 99</div>
    <button class="tasbih-dial" id="tasbihDial">
      <svg class="tasbih-ring" viewBox="0 0 200 200">
        <circle cx="100" cy="100" r="88" class="tasbih-ring-track"/>
        <circle cx="100" cy="100" r="88" class="tasbih-ring-progress" id="tasbihRingProgress"/>
      </svg>
      <div class="tasbih-count" id="tasbihCount">0</div>
      <div class="tasbih-hint">dokun</div>
    </button>
    <div class="sheet-actions">
      <button class="ghost-btn" id="tasbihReset">Sıfırla</button>
      <button class="ghost-btn" id="tasbihClose">Kapat</button>
    </div>
  </section>

  <!-- ================= SETTINGS SHEET ================= -->
  <div class="sheet-backdrop" id="settingsBackdrop" hidden></div>
  <section class="sheet settings-sheet" id="settingsSheet" hidden>
    <div class="sheet-handle"></div>
    <h2 class="sheet-title">Görünüm</h2>

    <div class="setting-row">
      <span>Görünüm modu</span>
      <div class="segmented" id="themeSegmented">
        <button data-theme="light">Açık</button>
        <button data-theme="dark" class="active">Koyu</button>
      </div>
    </div>

    <div class="setting-row">
      <span>Yazı boyutu</span>
      <div class="segmented" id="fontSegmented">
        <button data-size="small">A</button>
        <button data-size="medium" class="active">A</button>
        <button data-size="large">A</button>
        <button data-size="xlarge">A</button>
      </div>
    </div>

    <button class="ghost-btn full" id="settingsClose">Tamam</button>
  </section>

  <script src="js/duas.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
